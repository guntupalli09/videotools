name: Weekly Blog Post Generator

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run blog:generate

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Get new post slug
        id: post_info
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Extract the slug from the most recently changed generatedPosts.ts
          SLUG=$(git diff client/src/data/generatedPosts.ts | grep "^+.*slug:" | head -1 | sed "s/.*slug: '//;s/'.*//" || echo "new-post")
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "blog: add weekly post – ${{ steps.post_info.outputs.slug }}"
          branch: "blog/auto-${{ steps.post_info.outputs.slug }}"
          delete-branch: true
          title: "Blog: New weekly post – ${{ steps.post_info.outputs.slug }}"
          body: |
            ## Automated weekly blog post

            Generated by [generate-blog-post.ts](../../scripts/blog/generate-blog-post.ts) using Claude API.

            ### What changed
            - New post appended to `client/src/data/generatedPosts.ts`
            - Sitemap updated in `client/public/sitemap-core.xml`
            - SEO meta updated in `client/src/lib/seoMeta.ts`
            - Topic marked as used in `scripts/blog/topics.json`

            ### Review checklist
            - [ ] Content is accurate and matches VideoText features
            - [ ] Internal links point to real VideoText tool paths
            - [ ] No marketing fluff or hallucinated claims
            - [ ] Ready to merge and deploy

            *Auto-generated — review before merging*
          labels: "blog, automated"
