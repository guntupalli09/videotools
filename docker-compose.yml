# Redis: set REDIS_PASSWORD in .env (or leave unset for no auth in local dev only).
# When set, use REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379 in api/worker env.
# api/worker use redis:6379 on the Docker network. Ports below expose Redis on host for local dev (e.g. API on host).
services:
  redis:
    image: redis:7-alpine
    container_name: videotools-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # Less aggressive persistence to reduce fork() and blocking; AOF only keeps durability with fewer spikes.
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --save \"\" --appendonly yes --requirepass \"$$REDIS_PASSWORD\" --maxmemory 256mb --maxmemory-policy allkeys-lru; else redis-server --save \"\" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru; fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: videotools-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"   # Host 5433 to avoid conflict with local Postgres on 5432
    environment:
      POSTGRES_USER: videotools
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: videotext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videotools -d videotext"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: .
    image: videotools-api
    container_name: videotools-api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videotools:${POSTGRES_PASSWORD}@postgres:5432/videotext
      TEMP_FILE_PATH: /tmp
      STREAM_UPLOAD_ASSEMBLY: "true"
      DISABLE_WORKER: "true"
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes:
      - tmp-files:/tmp
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: videotools-api
    container_name: videotools-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videotools:${POSTGRES_PASSWORD}@postgres:5432/videotext
      TEMP_FILE_PATH: /tmp
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      # TTFW: extract first 20s chunk early instead of full-file extract then split
      PROCESSING_V2: "true"
      # Cookies for yt-dlp (bypass "Sign in to confirm you're not a bot")
      YOUTUBE_COOKIES_FILE: /app/yt_cookies.txt
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - tmp-files:/tmp
      - ./yt_cookies.txt:/app/yt_cookies.txt
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    command: node dist/workers/videoProcessor.js

volumes:
  redis-data:
  postgres-data:
  tmp-files:
