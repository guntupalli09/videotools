# Redis: set REDIS_PASSWORD in .env (or leave unset for no auth in local dev only).
# When set, use REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379 in api/worker env.
# api/worker use redis:6379 on the Docker network. Ports below expose Redis on host for local dev (e.g. API on host).
services:
  redis:
    image: redis:7-alpine
    container_name: videotools-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # Less aggressive persistence to reduce fork() and blocking; AOF only keeps durability with fewer spikes.
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --save \"\" --appendonly yes --requirepass \"$$REDIS_PASSWORD\" --maxmemory 256mb --maxmemory-policy allkeys-lru; else redis-server --save \"\" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru; fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: videotools-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"   # Host 5433 to avoid conflict with local Postgres on 5432
    environment:
      POSTGRES_USER: videotools
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: videotext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videotools -d videotext"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: .
    image: videotools-api
    container_name: videotools-api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videotools:${POSTGRES_PASSWORD}@postgres:5432/videotext
      TEMP_FILE_PATH: /tmp
      STREAM_UPLOAD_ASSEMBLY: "true"
      DISABLE_WORKER: "true"
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      # Must match worker — API routes YouTube jobs to captionQueue when true
      YOUTUBE_QUEUE_SEPARATION: "true"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes:
      - tmp-files:/tmp
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "<http://localhost:3001/healthz>"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: videotools-api
    container_name: videotools-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://videotools:${POSTGRES_PASSWORD}@postgres:5432/videotext
      TEMP_FILE_PATH: /tmp
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      # TTFW: extract first 20s chunk early instead of full-file extract then split
      PROCESSING_V2: "true"
      # Separate YouTube caption/audio/transcription queues so caption fetches (seconds)
      # are never blocked by Whisper transcription jobs (minutes). Both API and worker
      # must share this flag so jobs route to the same queue.
      YOUTUBE_QUEUE_SEPARATION: "true"
      # YouTube cookies written daily by cookie-refresher; read by yt-dlp on every job.
      # Set YOUTUBE_SKIP_COOKIES=true to disable cookies entirely
      # (e.g. if cookies cause "page needs to be reloaded" on your IP).
      YOUTUBE_SKIP_COOKIES: "false"
      YOUTUBE_COOKIES_FILE: /cookies/youtube.txt
      # Optional: residential proxy when YouTube blocks datacenter IPs. Same approach as Descript/TurboScribe.
      # Add to .env: YOUTUBE_PROXY=http://user:pass@proxy.example.com:8080 or socks5://...
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - tmp-files:/tmp
      - yt-cookies:/cookies   # shared with cookie-refresher
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    command: node dist/workers/videoProcessor.js

  # ── Cookie refresher ───────────────────────────────────────────────────────
  # Visits <youtube.com> daily (03:00 UTC) with your existing cookies to keep the
  # Google session alive. Does NOT automate login — you export cookies once from
  # your real browser; automation only handles the daily refresh.
  #
  # First-time setup (and whenever Google expires the session):
  #   1. Sign into YouTube in Chrome/Firefox on your local machine.
  #   2. Export cookies with "Get cookies.txt LOCALLY" extension → yt_cookies.txt
  #   3. Copy to the server volume:
  #        docker compose cp yt_cookies.txt cookie-refresher:/cookies/youtube.txt
  #        docker compose restart cookie-refresher worker
  #
  # Monitor: docker compose logs -f cookie-refresher
  # Healthy: "[refresh-yt-cookies] OK — wrote N cookies to /cookies/youtube.txt"
  # Expired: "[refresh-yt-cookies] ERROR: Session expired — re-export cookies from your browser."
  cookie-refresher:
    build:
      context: .
      dockerfile: Dockerfile.cookie-refresher
    container_name: videotools-cookie-refresher
    restart: unless-stopped
    environment:
      YOUTUBE_COOKIES_FILE: /cookies/youtube.txt
      HEADLESS: "true"
      # Optional: POST to this URL when the session expires (Slack/Discord incoming webhook)
      ALERT_WEBHOOK: ${ALERT_WEBHOOK:-}
    volumes:
      - yt-cookies:/cookies   # persists cookies.txt across restarts
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

volumes:
  redis-data:
  postgres-data:
  tmp-files:
  yt-cookies:    # shared between worker (reads cookies) and cookie-refresher (writes cookies)